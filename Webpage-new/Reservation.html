<section id="reservation-form" class="reservation-section">
    <h2>Reserve Your Stay</h2>
    <form action="/submit_reservation" method="POST">
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
        </div>

        <div class="form-group">
            <label for="check-in">Check-In Date:</label>
            <input type="date" id="check-in" name="check_in_date" required>
        </div>

        <div class="form-group">
            <label for="check-out">Check-Out Date:</label>
            <input type="date" id="check-out" name="check_out_date" required>
        </div>

        <div class="form-group">
            <label for="room">Room Type:</label>
            <select id="room" name="room_type" required>
                <option value="One bedroom Suite">One bedroom Suite</option>
                <option value="Family Suite">Family Suite</option>
                <option value="Royal Suite">Royal Suite</option>
            </select>
        </div>

        <button type="submit">Book Your Luxury Stay</button>
    </form>
</section>
